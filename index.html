<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>循迹 - 循身体之迹，见前行之路</title>
    <meta name="description" content="探索你的身体地图，让运动数据转化为健康洞察">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="app">
        <main class="container">
            <header class="header">
                <h1 class="brand-title">循迹</h1>
                <p class="brand-subtitle">循身体之迹，见前行之路</p>
            </header>

            <!-- 上传区域 -->
            <section class="upload-section">
                <h2 class="section-title">上传运动截图</h2>
                
                <!-- 上传交互区 -->
                <div id="uploadArea" class="upload-area">
                    <input type="file" id="fileInput" accept="image/*" capture="environment">
                    
                    <div id="uploadPrompt" class="upload-prompt">
                        <div class="upload-icon">📷</div>
                        <p class="upload-text">点击或拖拽上传</p>
                        <p class="upload-hint">支持 JPG、PNG 等常见图片格式</p>
                    </div>

                    <!-- 图片预览 -->
                    <div id="previewSection" class="preview-section" style="display: none;">
                        <img id="previewImage" class="preview-image" alt="预览图片">
                        <div class="preview-actions">
                            <button id="removeBtn" class="btn btn-secondary">重新选择</button>
                            <button id="parseBtn" class="btn btn-primary">开始分析</button>
                        </div>
                    </div>
                </div>

                <!-- 分析中动画 -->
                <div id="analyzingSection" class="analyzing-section" style="display: none;">
                    <div class="analysis-steps">
                        <div class="step active" id="step-ocr">
                            <div class="step-icon">🔍</div>
                            <div class="step-text">OCR 识别文字</div>
                            <div class="step-status">正在识别...</div>
                        </div>
                        <div class="step" id="step-extract">
                            <div class="step-icon">📊</div>
                            <div class="step-text">提取健康指标</div>
                            <div class="step-status">等待中...</div>
                        </div>
                        <div class="step" id="step-analyze">
                            <div class="step-icon">🤖</div>
                            <div class="step-text">大模型分析</div>
                            <div class="step-status">等待中...</div>
                        </div>
                    </div>
                </div>

                <!-- 分析结果展示 -->
                <div id="analysisResultSection" class="analysis-result-section" style="display: none;">
                    <div class="result-header">
                        <h3 class="result-title">📝 分析结果</h3>
                        <button id="retryBtn" class="btn btn-secondary btn-small">重新分析</button>
                    </div>

                    <!-- 提取的指标 -->
                    <div class="metrics-card">
                        <h4 class="metrics-title">🏃 运动指标</h4>
                        <div id="metricsDisplay" class="metrics-grid"></div>
                    </div>

                    <!-- 大白话解读 -->
                    <div class="interpretation-card">
                        <h4 class="interpretation-title">💡 大白话解读</h4>
                        <div id="interpretationText" class="interpretation-text"></div>
                    </div>

                    <!-- 下次锻炼建议 -->
                    <div class="recommendation-card">
                        <h4 class="recommendation-title">🎯 下次锻炼建议</h4>
                        <div id="recommendationText" class="recommendation-text"></div>
                    </div>

                    <!-- 保存按钮 -->
                    <div class="result-actions">
                        <button id="saveResultBtn" class="btn btn-primary">保存记录</button>
                    </div>
                </div>
            </section>

            <!-- 运动记录列表 -->
            <section class="records-section">
                <div class="records-header">
                    <h2 class="section-title">运动记录</h2>
                    <span id="recordsCount" class="records-count">0 条</span>
                </div>

                <div id="recordsList" class="records-list">
                    <div id="emptyState" class="empty-state">
                        <div class="empty-icon">📝</div>
                        <p class="empty-text">还没有运动记录</p>
                        <p class="empty-hint">上传第一张截图开始记录</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/state.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/records.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
