<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>循迹 - 健身追踪器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* 设计系统 */
        :root {
            --color-primary: #1B4332;
            --color-primary-light: #2D5A3D;
            --color-accent: #E8A838;
            --color-success: #4CAF50;
            --color-warning: #FF9800;
            --color-error: #F44336;
            --color-bg: #F5F3F0;
            --color-surface: #FFFFFF;
            --color-text: #1B4332;
            --color-text-muted: #6B7280;
            --border-radius: 16px;
            --shadow-soft: 0 4px 20px rgba(27, 67, 50, 0.1);
            --shadow-medium: 0 8px 30px rgba(27, 67, 50, 0.15);
            --transition-fast: 200ms ease;
            --transition-medium: 350ms ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            padding: 20px;
        }

        #app {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            padding: 40px 0;
        }

        .header-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 8px;
        }

        .header-subtitle {
            font-size: 1rem;
            color: var(--color-text-muted);
        }

        /* 上传区域 */
        .upload-section {
            background: var(--color-surface);
            border-radius: var(--border-radius);
            padding: 32px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 24px;
        }

        .upload-area {
            border: 2px dashed var(--color-primary-light);
            border-radius: var(--border-radius);
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-medium);
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: var(--color-primary);
            background: rgba(27, 67, 50, 0.03);
        }

        .upload-area.dragover {
            border-color: var(--color-accent);
            background: rgba(232, 168, 56, 0.1);
            transform: scale(1.02);
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            color: var(--color-primary);
        }

        .upload-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .upload-hint {
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        .upload-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* 预览区域 */
        .preview-section {
            display: none;
            margin-top: 24px;
            animation: fadeIn 0.4s ease;
        }

        .preview-section.show {
            display: block;
        }

        .preview-image-container {
            position: relative;
            border-radius: var(--border-radius);
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: var(--shadow-soft);
        }

        .preview-image {
            width: 100%;
            height: auto;
            display: block;
            max-height: 400px;
            object-fit: contain;
        }

        .preview-remove {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .preview-remove:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: scale(1.1);
        }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
            color: white;
            box-shadow: 0 4px 15px rgba(27, 67, 50, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(27, 67, 50, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--color-surface);
            color: var(--color-primary);
            border: 2px solid var(--color-primary-light);
        }

        .btn-secondary:hover {
            background: rgba(27, 67, 50, 0.05);
        }

        .btn-full {
            width: 100%;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .btn-group .btn {
            flex: 1;
        }

        /* 解析进度 */
        .parsing-section {
            display: none;
            margin-top: 24px;
            animation: fadeIn 0.4s ease;
        }

        .parsing-section.show {
            display: block;
        }

        .parsing-steps {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .parsing-step {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--color-bg);
            border-radius: 12px;
            transition: all var(--transition-medium);
        }

        .parsing-step.active {
            background: rgba(27, 67, 50, 0.05);
        }

        .parsing-step.completed {
            background: rgba(76, 175, 80, 0.08);
        }

        .step-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .step-icon.pending {
            background: var(--color-text-muted);
            color: white;
        }

        .step-icon.active {
            background: var(--color-accent);
            color: white;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .step-icon.completed {
            background: var(--color-success);
            color: white;
        }

        .step-content {
            flex: 1;
        }

        .step-title {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .step-desc {
            font-size: 0.875rem;
            color: var(--color-text-muted);
        }

        /* 结果确认 */
        .result-section {
            display: none;
            margin-top: 24px;
            animation: slideUp 0.5s ease;
        }

        .result-section.show {
            display: block;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--color-bg);
        }

        .result-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.15);
            color: var(--color-success);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* 数据卡片 */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .data-card {
            background: var(--color-bg);
            padding: 20px;
            border-radius: 12px;
        }

        .data-label {
            font-size: 0.875rem;
            color: var(--color-text-muted);
            margin-bottom: 8px;
        }

        .data-value {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--color-primary);
        }

        .data-input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--color-bg);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            background: white;
            transition: all var(--transition-fast);
        }

        .data-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .data-select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--color-bg);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }

        /* 记录列表 */
        .records-section {
            background: var(--color-surface);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--shadow-soft);
        }

        .records-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .records-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .records-count {
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        .record-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--color-bg);
            border-radius: 12px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        .record-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(27, 67, 50, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
            flex-shrink: 0;
        }

        .record-content {
            flex: 1;
        }

        .record-type {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .record-meta {
            font-size: 0.875rem;
            color: var(--color-text-muted);
        }

        .record-stats {
            text-align: right;
        }

        .record-distance {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-primary);
        }

        .record-date {
            font-size: 0.875rem;
            color: var(--color-text-muted);
        }

        .record-empty {
            text-align: center;
            padding: 40px;
            color: var(--color-text-muted);
        }

        .record-empty-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            opacity: 0.5;
        }

        /* 通知 */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--color-primary);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow-medium);
            opacity: 0;
            transition: all var(--transition-medium);
            z-index: 1000;
            max-width: 90%;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--color-success);
        }

        .toast.error {
            background: var(--color-error);
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .header-title {
                font-size: 2rem;
            }

            .upload-section {
                padding: 20px;
            }

            .upload-area {
                padding: 32px 16px;
            }

            .data-grid {
                grid-template-columns: 1fr;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <h1 class="header-title">循迹</h1>
            <p class="header-subtitle">记录每一次运动，见证身体变化</p>
        </header>

        <section class="upload-section">
            <div class="upload-area" id="uploadArea">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
                <h2 class="upload-title">上传运动截图</h2>
                <p class="upload-hint">点击或拖拽图片到这里</p>
                <input type="file" class="upload-input" id="fileInput" accept="image/*">
            </div>

            <div class="preview-section" id="previewSection">
                <div class="preview-image-container">
                    <img class="preview-image" id="previewImage" alt="预览">
                    <button class="preview-remove" id="removeBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="reuploadBtn">重新选择</button>
                    <button class="btn btn-primary" id="parseBtn">开始解析</button>
                </div>
            </div>

            <div class="parsing-section" id="parsingSection">
                <div class="parsing-steps">
                    <div class="parsing-step" id="step1">
                        <div class="step-icon pending">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                        </div>
                        <div class="step-content">
                            <div class="step-title">加载图片</div>
                            <div class="step-desc">正在读取图片数据...</div>
                        </div>
                    </div>
                    <div class="parsing-step" id="step2">
                        <div class="step-icon pending">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                        </div>
                        <div class="step-content">
                            <div class="step-title">分析数据</div>
                            <div class="step-desc">识别运动信息...</div>
                        </div>
                    </div>
                    <div class="parsing-step" id="step3">
                        <div class="step-icon pending">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                        </div>
                        <div class="step-content">
                            <div class="step-title">提取信息</div>
                            <div class="step-desc">解析距离、时长等数据...</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="result-section" id="resultSection">
                <div class="result-header">
                    <div class="result-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <h2 class="result-title">解析完成</h2>
                </div>

                <div class="data-grid">
                    <div class="data-card">
                        <label class="data-label">运动类型</label>
                        <select class="data-select" id="workoutType">
                            <option value="running">跑步</option>
                            <option value="cycling">骑行</option>
                            <option value="swimming">游泳</option>
                            <option value="walking">步行</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="data-card">
                        <label class="data-label">距离 (公里)</label>
                        <input type="number" class="data-input" id="workoutDistance" step="0.1" min="0" value="5.2">
                    </div>
                    <div class="data-card">
                        <label class="data-label">时长 (分钟)</label>
                        <input type="number" class="data-input" id="workoutDuration" min="1" value="35">
                    </div>
                    <div class="data-card">
                        <label class="data-label">平均心率</label>
                        <input type="number" class="data-input" id="workoutHeartRate" min="30" max="220" value="138">
                    </div>
                </div>

                <div class="data-card" style="grid-column: 1 / -1;">
                    <label class="data-label">备注</label>
                    <input type="text" class="data-input" id="workoutNotes" placeholder="添加备注（可选）">
                </div>

                <div class="btn-group" style="margin-top: 24px;">
                    <button class="btn btn-secondary" id="cancelBtn">取消</button>
                    <button class="btn btn-primary" id="saveBtn">保存记录</button>
                </div>
            </div>
        </section>

        <section class="records-section">
            <div class="records-header">
                <h2 class="records-title">运动记录</h2>
                <span class="records-count" id="recordsCount">0 条</span>
            </div>
            <div id="recordsList">
                <div class="record-empty" id="emptyState">
                    <svg class="record-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="9" y1="9" x2="15" y2="9"/>
                        <line x1="9" y1="15" x2="15" y2="15"/>
                    </svg>
                    <p>还没有运动记录</p>
                    <p style="font-size: 0.875rem; margin-top: 8px;">上传第一张截图开始记录吧</p>
                </div>
            </div>
        </section>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 应用状态
        const state = {
            currentImage: null,
            records: JSON.parse(localStorage.getItem('fitnessRecords') || '[]'),
            currentStep: 'upload' // upload, preview, parsing, result
        };

        console.log('🚀 健身追踪器应用初始化');
        console.log('📦 初始状态:', state);

        // DOM 元素
        const elements = {
            uploadArea: document.getElementById('uploadArea'),
            fileInput: document.getElementById('fileInput'),
            previewSection: document.getElementById('previewSection'),
            previewImage: document.getElementById('previewImage'),
            removeBtn: document.getElementById('removeBtn'),
            reuploadBtn: document.getElementById('reuploadBtn'),
            parseBtn: document.getElementById('parseBtn'),
            parsingSection: document.getElementById('parsingSection'),
            resultSection: document.getElementById('resultSection'),
            workoutType: document.getElementById('workoutType'),
            workoutDistance: document.getElementById('workoutDistance'),
            workoutDuration: document.getElementById('workoutDuration'),
            workoutHeartRate: document.getElementById('workoutHeartRate'),
            workoutNotes: document.getElementById('workoutNotes'),
            cancelBtn: document.getElementById('cancelBtn'),
            saveBtn: document.getElementById('saveBtn'),
            recordsList: document.getElementById('recordsList'),
            recordsCount: document.getElementById('recordsCount'),
            emptyState: document.getElementById('emptyState'),
            toast: document.getElementById('toast')
        };

        // 工具函数
        function showToast(message, type = 'success') {
            console.log(`📢 显示通知: ${message} (${type})`);
            elements.toast.textContent = message;
            elements.toast.className = `toast ${type} show`;
            setTimeout(() => {
                elements.toast.classList.remove('show');
            }, 3000);
        }

        function saveRecords() {
            console.log('💾 保存记录到 localStorage');
            localStorage.setItem('fitnessRecords', JSON.stringify(state.records));
        }

        function getIconForType(type) {
            const icons = {
                running: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7"/></svg>',
                cycling: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h3"/></svg>',
                swimming: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 10c1 0 1.5 1 3 1s2-1 3-1 1.5 1 3 1 2-1 3-1"/><path d="M9 17c1 0 1.5 1 3 1s2-1 3-1 1.5 1 3 1 2-1 3-1"/><path d="M12 5c-1 1-2 1-3 1s-1.5-1-3-1-2 1-3 1"/><path d="M5 5l1.5 3H9"/><path d="M15 5l1.5 3H19"/></svg>',
                walking: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="4.5" r="2.5"/><path d="M10 21.5V15l-2 1.5"/><path d="M15.5 8.5 12 12l1.5 5.5"/><path d="M10 12h3l1.5 3.5"/></svg>',
                other: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>'
            };
            return icons[type] || icons.other;
        }

        function getTypeName(type) {
            const names = {
                running: '跑步',
                cycling: '骑行',
                swimming: '游泳',
                walking: '步行',
                other: '运动'
            };
            return names[type] || '运动';
        }

        function formatDate(date) {
            const d = new Date(date);
            const options = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            return d.toLocaleDateString('zh-CN', options);
        }

        // 渲染记录列表
        function renderRecords() {
            console.log('🎨 渲染记录列表，共', state.records.length, '条');
            
            if (state.records.length === 0) {
                elements.emptyState.style.display = 'block';
                elements.recordsCount.textContent = '0 条';
                return;
            }

            elements.emptyState.style.display = 'none';
            elements.recordsCount.textContent = `${state.records.length} 条`;

            const recordsHTML = state.records
                .sort((a, b) => new Date(b.date) - new Date(a.date))
                .map((record, index) => `
                    <div class="record-item" style="animation-delay: ${index * 0.05}s">
                        <div class="record-icon">
                            ${getIconForType(record.type)}
                        </div>
                        <div class="record-content">
                            <div class="record-type">${getTypeName(record.type)}</div>
                            <div class="record-meta">
                                ${record.duration} 分钟 · 心率 ${record.heartRate || '-'} 次/分
                                ${record.notes ? ` · ${record.notes}` : ''}
                            </div>
                        </div>
                        <div class="record-stats">
                            <div class="record-distance">${record.distance} km</div>
                            <div class="record-date">${formatDate(record.date)}</div>
                        </div>
                    </div>
                `).join('');

            elements.recordsList.innerHTML = recordsHTML + elements.emptyState.outerHTML;
        }

        // 重置到初始状态
        function resetToUpload() {
            console.log('🔄 重置到上传状态');
            state.currentImage = null;
            state.currentStep = 'upload';
            
            elements.previewSection.classList.remove('show');
            elements.parsingSection.classList.remove('show');
            elements.resultSection.classList.remove('show');
            elements.fileInput.value = '';
            
            // 重置步骤图标
            ['step1', 'step2', 'step3'].forEach(id => {
                const step = document.getElementById(id);
                step.classList.remove('active', 'completed');
                step.querySelector('.step-icon').className = 'step-icon pending';
            });
        }

        // 处理文件选择
        function handleFileSelect(file) {
            console.log('📁 处理文件选择:', file.name);
            
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                console.error('❌ 文件类型错误:', file.type);
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                console.log('✅ 文件读取完成');
                state.currentImage = e.target.result;
                state.currentStep = 'preview';
                
                elements.previewImage.src = e.target.result;
                elements.previewSection.classList.add('show');
                
                // 生成模拟数据
                elements.workoutDistance.value = (Math.random() * 10 + 1).toFixed(1);
                elements.workoutDuration.value = Math.floor(Math.random() * 60 + 20);
                elements.workoutHeartRate.value = Math.floor(Math.random() * 50 + 110);
                
                console.log('📊 生成的模拟数据:', {
                    distance: elements.workoutDistance.value,
                    duration: elements.workoutDuration.value,
                    heartRate: elements.workoutHeartRate.value
                });
            };
            
            reader.onerror = (error) => {
                console.error('❌ 文件读取失败:', error);
                showToast('文件读取失败', 'error');
            };
            
            reader.readAsDataURL(file);
        }

        // 模拟解析过程
        async function simulateParsing() {
            console.log('🔍 开始解析流程');
            state.currentStep = 'parsing';
            
            elements.previewSection.classList.remove('show');
            elements.parsingSection.classList.add('show');
            
            const steps = ['step1', 'step2', 'step3'];
            
            for (let i = 0; i < steps.length; i++) {
                const step = document.getElementById(steps[i]);
                step.classList.add('active');
                step.querySelector('.step-icon').className = 'step-icon active';
                console.log(`⏳ 执行步骤 ${i + 1}: ${step.querySelector('.step-title').textContent}`);
                
                await new Promise(resolve => setTimeout(resolve, 800));
                
                step.classList.remove('active');
                step.classList.add('completed');
                step.querySelector('.step-icon').className = 'step-icon completed';
                console.log(`✅ 步骤 ${i + 1} 完成`);
            }
            
            console.log('🎉 解析完成，显示结果');
            elements.parsingSection.classList.remove('show');
            elements.resultSection.classList.add('show');
            state.currentStep = 'result';
        }

        // 保存记录
        function saveRecord() {
            console.log('💾 准备保存记录');
            
            const record = {
                id: Date.now().toString(),
                type: elements.workoutType.value,
                distance: parseFloat(elements.workoutDistance.value),
                duration: parseInt(elements.workoutDuration.value),
                heartRate: parseInt(elements.workoutHeartRate.value) || null,
                notes: elements.workoutNotes.value || '',
                date: new Date().toISOString(),
                image: state.currentImage
            };
            
            console.log('📝 记录数据:', record);
            
            state.records.push(record);
            saveRecords();
            renderRecords();
            
            showToast('记录保存成功！');
            console.log('✅ 记录已保存');
            
            resetToUpload();
        }

        // 事件绑定
        elements.uploadArea.addEventListener('click', () => {
            console.log('👆 点击上传区域');
            elements.fileInput.click();
        });

        elements.uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            elements.uploadArea.classList.add('dragover');
        });

        elements.uploadArea.addEventListener('dragleave', () => {
            elements.uploadArea.classList.remove('dragover');
        });

        elements.uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            elements.uploadArea.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                console.log('🖱️ 文件拖放');
                handleFileSelect(files[0]);
            }
        });

        elements.fileInput.addEventListener('change', (e) => {
            console.log('📁 文件输入变化');
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        elements.removeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            console.log('🗑️ 点击移除按钮');
            resetToUpload();
        });

        elements.reuploadBtn.addEventListener('click', () => {
            console.log('🔄 点击重新选择');
            resetToUpload();
            elements.fileInput.click();
        });

        elements.parseBtn.addEventListener('click', () => {
            console.log('▶️ 点击开始解析');
            simulateParsing();
        });

        elements.cancelBtn.addEventListener('click', () => {
            console.log('❌ 点击取消');
            resetToUpload();
        });

        elements.saveBtn.addEventListener('click', () => {
            console.log('💾 点击保存');
            saveRecord();
        });

        // 初始化
        console.log('🏁 应用启动，开始初始化');
        renderRecords();
        console.log('✅ 初始化完成');
    </script>
</body>
</html>
